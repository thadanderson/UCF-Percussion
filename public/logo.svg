<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#111111"/>

  <!-- Drum hoop: outer and inner rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="1.8"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- 12 tension lugs at radius 44, every 30° -->
  <circle cx="94" cy="50"   r="3.2" fill="white"/>
  <circle cx="89.1" cy="72" r="3.2" fill="white"/>
  <circle cx="72"   cy="89.1" r="3.2" fill="white"/>
  <circle cx="50"   cy="94" r="3.2" fill="white"/>
  <circle cx="28"   cy="89.1" r="3.2" fill="white"/>
  <circle cx="10.9" cy="72" r="3.2" fill="white"/>
  <circle cx="6"    cy="50" r="3.2" fill="white"/>
  <circle cx="10.9" cy="28" r="3.2" fill="white"/>
  <circle cx="28"   cy="10.9" r="3.2" fill="white"/>
  <circle cx="50"   cy="6"  r="3.2" fill="white"/>
  <circle cx="72"   cy="10.9" r="3.2" fill="white"/>
  <circle cx="89.1" cy="28" r="3.2" fill="white"/>

  <!-- UCF text -->
  <text
    x="50" y="60"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="25"
    fill="#FFC904"
    text-anchor="middle"
    letter-spacing="2"
  >UCF</text>
</svg>
